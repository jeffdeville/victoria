apiVersion: v1
kind: Service
metadata:
  name: vmsingle-nodeport
  namespace: monitoring
  labels:
    app.kubernetes.io/part-of: observability-stable-ingress
spec:
  type: NodePort
  ports:
    - name: http
      port: 8428
      targetPort: 8428
      nodePort: 30428
      protocol: TCP
  selector:
    app.kubernetes.io/component: monitoring
    app.kubernetes.io/instance: vm-victoria-metrics-k8s-stack
    app.kubernetes.io/name: vmsingle
    managed-by: vm-operator
