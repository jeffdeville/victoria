# victoria-logs-single
# Helm repo: vm  (https://victoriametrics.github.io/helm-charts/)
# Chart:     vm/victoria-logs-single

server:
  retentionPeriod: "14d"

  persistentVolume:
    enabled: true
    size: 15Gi

  ingress:
    enabled: true
    hosts:
      - name: logs.obsrv.clny.dev
        path:
          - /
        port: http
