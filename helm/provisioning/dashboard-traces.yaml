apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-traces
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  traces.json: |
    {
      "title": "All Projects — Traces",
      "uid": "colony-traces",
      "description": "Distributed trace explorer. Click any span rate spike to search matching traces. Traces link back to correlated logs.",
      "tags": ["colony", "traces"],
      "timezone": "browser",
      "refresh": "30s",
      "schemaVersion": 39,
      "time": { "from": "now-3h", "to": "now" },
      "graphTooltip": 1,
      "templating": {
        "list": [
          {
            "name": "project",
            "label": "Project",
            "type": "query",
            "datasource": { "type": "prometheus", "uid": "P4169E866C3094E38" },
            "definition": "label_values(project)",
            "query": { "query": "label_values(project)", "refId": "A" },
            "refresh": 2,
            "multi": true,
            "includeAll": true,
            "allValue": ".+",
            "current": { "selected": true, "text": "All", "value": "$__all" },
            "sort": 1
          },
          {
            "name": "service",
            "label": "Service",
            "type": "query",
            "datasource": { "type": "prometheus", "uid": "P4169E866C3094E38" },
            "definition": "label_values(traces_spanmetrics_calls_total{project=~\"$project\"}, service_name)",
            "query": { "query": "label_values(traces_spanmetrics_calls_total{project=~\"$project\"}, service_name)", "refId": "A" },
            "refresh": 2,
            "multi": true,
            "includeAll": true,
            "allValue": ".+",
            "current": { "selected": true, "text": "All", "value": "$__all" },
            "sort": 1
          }
        ]
      },
      "panels": [
        {
          "type": "timeseries",
          "title": "Span Rate by Service",
          "description": "Total spans/sec per service. Spikes indicate increased traffic or errors.",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "P4169E866C3094E38" },
          "targets": [{
            "datasource": { "type": "prometheus", "uid": "P4169E866C3094E38" },
            "expr": "sum by (service_name) (rate(traces_spanmetrics_calls_total{project=~\"$project\", service_name=~\"$service\"}[$__rate_interval]))",
            "legendFormat": "{{service_name}}",
            "refId": "A"
          }],
          "options": { "tooltip": { "mode": "multi" }, "legend": { "displayMode": "list", "placement": "bottom" } },
          "fieldConfig": { "defaults": { "unit": "ops", "custom": { "lineWidth": 1, "fillOpacity": 10 } } }
        },
        {
          "type": "timeseries",
          "title": "Error Span Rate by Service",
          "description": "Spans with status=error. Any non-zero value deserves attention.",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "P4169E866C3094E38" },
          "targets": [{
            "datasource": { "type": "prometheus", "uid": "P4169E866C3094E38" },
            "expr": "sum by (service_name) (rate(traces_spanmetrics_calls_total{project=~\"$project\", service_name=~\"$service\", status_code=\"STATUS_CODE_ERROR\"}[$__rate_interval]))",
            "legendFormat": "{{service_name}} errors",
            "refId": "A"
          }],
          "options": { "tooltip": { "mode": "multi" }, "legend": { "displayMode": "list", "placement": "bottom" } },
          "fieldConfig": {
            "defaults": { "unit": "ops", "custom": { "lineWidth": 1, "fillOpacity": 10 } },
            "overrides": [{ "matcher": { "id": "byRegexp", "options": ".*" }, "properties": [{ "id": "color", "value": { "fixedColor": "red", "mode": "fixed" } }] }]
          }
        },
        {
          "type": "timeseries",
          "title": "p99 Span Duration by Service",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 8 },
          "datasource": { "type": "prometheus", "uid": "P4169E866C3094E38" },
          "targets": [{
            "datasource": { "type": "prometheus", "uid": "P4169E866C3094E38" },
            "expr": "histogram_quantile(0.99, sum by (service_name, le) (rate(traces_spanmetrics_duration_milliseconds_bucket{project=~\"$project\", service_name=~\"$service\"}[$__rate_interval])))",
            "legendFormat": "{{service_name}} p99",
            "refId": "A"
          }],
          "options": { "tooltip": { "mode": "multi" }, "legend": { "displayMode": "list", "placement": "bottom" } },
          "fieldConfig": { "defaults": { "unit": "ms", "custom": { "lineWidth": 1, "fillOpacity": 10 } } }
        },
        {
          "type": "timeseries",
          "title": "p50 Span Duration by Service",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 8 },
          "datasource": { "type": "prometheus", "uid": "P4169E866C3094E38" },
          "targets": [{
            "datasource": { "type": "prometheus", "uid": "P4169E866C3094E38" },
            "expr": "histogram_quantile(0.50, sum by (service_name, le) (rate(traces_spanmetrics_duration_milliseconds_bucket{project=~\"$project\", service_name=~\"$service\"}[$__rate_interval])))",
            "legendFormat": "{{service_name}} p50",
            "refId": "A"
          }],
          "options": { "tooltip": { "mode": "multi" }, "legend": { "displayMode": "list", "placement": "bottom" } },
          "fieldConfig": { "defaults": { "unit": "ms", "custom": { "lineWidth": 1, "fillOpacity": 10 } } }
        },
        {
          "type": "traces",
          "title": "Trace Search",
          "description": "Search for individual traces. Clicking a trace opens the full span timeline with log correlation.",
          "gridPos": { "h": 12, "w": 24, "x": 0, "y": 16 },
          "datasource": { "type": "tempo", "uid": "victoriatraces" },
          "targets": [{
            "datasource": { "type": "tempo", "uid": "victoriatraces" },
            "queryType": "traceql",
            "query": "{ resource.project =~ \"$project\" && resource.service.name =~ \"$service\" }",
            "refId": "A",
            "limit": 20
          }],
          "options": { "frameType": "search" }
        }
      ]
    }
