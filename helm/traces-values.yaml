# victoria-traces-single
# Note: VictoriaTraces is pre-GA (v0.8.x as of 2026-03). OTLP ingestion is stable.
#       The Tempo datasource API (used by Grafana) is marked experimental upstream.
# Helm repo: vm  (https://victoriametrics.github.io/helm-charts/)
# Chart:     vm/victoria-traces-single

server:
  retentionPeriod: "14d"

  persistentVolume:
    enabled: true
    size: 10Gi

  ingress:
    enabled: true
    hosts:
      - name: traces.obsrv.clny.dev
        path:
          - /
        port: http
